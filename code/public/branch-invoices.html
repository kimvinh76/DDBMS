<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Branch Invoices</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="branch-invoices">
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand-box">
          <p class="eyebrow">DDBMS Demo</p>
          <h2 id="branchTitle">Chi nhánh</h2>
        </div>
        <nav class="side-nav">
          <a href="/branch-dashboard.html" class="nav-link">Dashboard</a>
          <a href="/branch-employees.html" class="nav-link">Nhân viên</a>
          <a href="/branch-invoices.html" class="nav-link active">Hóa đơn</a>
          <a href="/branch-inventory.html" class="nav-link">Tồn kho</a>
        </nav>
        <button class="ghost sidebar-logout" id="logoutBtn">Đăng xuất</button>
      </aside>

      <section class="content-panel">
        <header class="topbar modern-topbar">
          <div>
            <p class="eyebrow">Tác vụ Cục bộ</p>
            <h1>Quản lý hoa don</h1>
          </div>
        </header>

        <section class="card" id="invoices">
          <div class="section-head">
            <h2>Quản lý Hóa đơn</h2>
          </div>
          <p class="api-line" id="invoicesApiLine"></p>
          <div class="crud-switch" id="invoicesCrudSwitch">
            <button class="crud-tab active" data-crud-target="create">
              Create
            </button>
          </div>

          <div class="crud-panel active" data-crud-panel="create">
            <form id="invoiceCreateForm" class="form-grid invoice-create-grid">
              <label class="invoice-meta" style="grid-column: span 2;">
                Ma nhan vien
                <input name="employeeId" placeholder="VD: H001" />
              </label>
              <label class="invoice-meta" style="grid-column: span 2;">
                Tong tien
                <input type="number" name="totalAmount" min="0" readonly />
              </label>
              <div class="invoice-meta-action">
                <button type="button" class="primary invoice-add-item-btn" data-add-invoice-item>
                  Them dong san pham
                </button>
              </div>
              <div class="full">
                <div class="invoice-items" data-invoice-items></div>
              </div>
              <label class="full">
                Ghi chu
                <input name="note" placeholder="Khuyen mai cuoi tuan..." />
              </label>
              <button type="submit" class="primary">Thêm hoa don</button>
            </form>
          </div>

          <div class="section-head compact-top">
            <p class="hint">
              Danh sach du lieu (luon hien thi).
            </p>
            <button class="ghost" id="reloadInvoices">Tai danh sach</button>
          </div>
          <div class="table-wrap" id="invoicesTableWrap"></div>

          <div class="section-head compact-top" id="invoiceDetailsHeader" style="display: none;">
            <h3>Chi tiết hóa đơn: <span id="invoiceDetailsTitle"></span></h3>
          </div>
          <div class="table-wrap" id="invoiceDetailsTableWrap" style="display: none; margin-bottom: 1rem;"></div>

          <pre class="result-box" id="invoiceResult">Chưa co thao tac.</pre>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
