<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DDBMS Demo - Chon Chi Nhanh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="landing">
    <main class="hero-wrap">
      <section class="hero-card">
        <p class="eyebrow">Do an Co So Du Lieu Phan Tan</p>
        <h1>Quản lý Cua hang Tien loi<br />3 Chi nhánh + 1 Central</h1>
        <p class="subtitle">
          Lua chon vai tro dang nhap de mo phong phan manh ngang, truy van toan
          cuc va giao dich phan tan.
        </p>

        <div class="branch-grid">
          <button class="branch-btn hue" data-branch="HUE">
            Dang nhap Chi nhánh Hue
          </button>
          <button class="branch-btn saigon" data-branch="SAIGON">
            Dang nhap Chi nhánh Sai Gon
          </button>
          <button class="branch-btn hanoi" data-branch="HANOI">
            Dang nhap Chi nhánh Ha Noi
          </button>
          <button class="branch-btn central" data-branch="CENTRAL">
            Dang nhap Tong Cong Ty (Central)
          </button>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
