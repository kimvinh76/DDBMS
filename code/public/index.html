<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DDBMS Demo - Chọn Chi Nhánh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="landing">
    <main class="hero-wrap">
      <section class="hero-card">
        <p class="eyebrow">Đồ án Cơ Sở Dữ Liệu Phân Tán</p>
        <h1>Quản lý Cửa hàng Tiện lợi<br />3 Chi nhánh + 1 Central</h1>
        <p class="subtitle">
          Lựa chọn vai trò đăng nhập để mô phỏng phân mảnh ngang, truy vấn toàn
          cục và giao dịch phân tán.
        </p>

        <div class="branch-grid">
          <button class="branch-btn hue" data-branch="HUE">
            Đăng nhập Chi nhánh Huế
          </button>
          <button class="branch-btn saigon" data-branch="SAIGON">
            Đăng nhập Chi nhánh Sài Gòn
          </button>
          <button class="branch-btn hanoi" data-branch="HANOI">
            Đăng nhập Chi nhánh Hà Nội
          </button>
          <button class="branch-btn central" data-branch="CENTRAL">
            Đăng nhập Tổng Công Ty (Central)
          </button>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
