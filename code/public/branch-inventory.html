<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Branch Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="branch-inventory">
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand-box">
          <p class="eyebrow">DDBMS Demo</p>
          <h2 id="branchTitle">Chi nhánh</h2>
        </div>
        <nav class="side-nav">
          <a href="/branch-dashboard.html" class="nav-link">Dashboard</a>
          <a href="/branch-employees.html" class="nav-link">Nhân viên</a>
          <a href="/branch-invoices.html" class="nav-link">Hóa đơn</a>
          <a href="/branch-products.html" class="nav-link">Sản phẩm</a>
          <a href="/branch-inventory.html" class="nav-link active">Tồn kho</a>
        </nav>
        <button class="ghost sidebar-logout" id="logoutBtn">Đăng xuất</button>
      </aside>

      <section class="content-panel">
        <header class="topbar modern-topbar">
          <div>
            <p class="eyebrow">Tác vụ Cục bộ</p>
            <h1>Quản lý tồn kho</h1>
          </div>
        </header>

        <section class="card" id="inventory">
          <div class="section-head">
            <h2>Cập nhật Tồn kho</h2>
          </div>
          <p class="api-line" id="inventoryApiLine"></p>
          <div class="crud-switch" id="inventoryCrudSwitch">
            <button class="crud-tab active" data-crud-target="update">Update</button>
          </div>

          <div class="crud-panel active" data-crud-panel="update">
            <form id="inventoryUpdateForm" class="form-grid compact-top">
              <label>
                MaSP cần sửa
                <input name="productCode" required />
              </label>
              <label>
                Số lượng tồn mới
                <input type="number" name="quantity" min="0" required />
              </label>
              <button type="submit" class="ghost">Cập nhật tồn kho</button>
            </form>
          </div>

          <div class="section-head compact-top">
            <p class="hint">
              Danh sách dữ liệu (luôn hiển thị) - click row để điền nhanh form
              Cập nhật.
            </p>
            <button class="ghost" id="reloadInventory">Tải danh sách</button>
          </div>
          <div class="table-wrap" id="inventoryTableWrap"></div>

          <pre class="result-box" id="inventoryResult">Chưa có thao tác.</pre>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
